name: Python Syntax Check

on:
  push:
  pull_request:

jobs:
  py_compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip pyyaml
      - run: python -m py_compile scripts/srna_imp.py
